apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: librechat
  namespace: argocd
  labels:
    app.kubernetes.io/name: librechat
    app.kubernetes.io/part-of: utilities
spec:
  project: utilities
  sources:
    - repoURL: oci://ghcr.io/danny-avila/librechat-chart
      chart: librechat
      targetRevision: latest
      helm:
        valueFiles:
          - path: values.yaml
            repoURL: https://github.com/SecKatie/infrastructure.git
  destination:
    server: https://kubernetes.default.svc
    namespace: librechat
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
