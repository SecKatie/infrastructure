apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # ArgoCD config
  - argocd-cm.yaml

  # AppProject (allowed repos and destinations)
  - projects/infrastructure.yaml

  # ApplicationSets (generate Applications from repo paths)
  - applicationsets/media.yaml
  - applicationsets/monitoring.yaml
  - applicationsets/utilities.yaml
  - applicationsets/tools.yaml

  # Standalone Applications (external repos, one-offs)
  - applications/argocd.yaml
  - applications/librechat.yaml

  # Ingress and TLS for ArgoCD
  - ingress.yaml
  - certificate.yaml

