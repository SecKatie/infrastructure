apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: librechat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-api
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: rag-api
          image: ghcr.io/danny-avila/librechat-rag-api-dev-lite:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: RAG_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: librechat-credentials-env
                  key: SYNTHETIC_API_KEY
            - name: RAG_OPENAI_BASEURL
              value: "https://api.synthetic.new/openai/v1"
            - name: EMBEDDINGS_MODEL
              value: "hf:nomic-ai/nomic-embed-text-v1.5"
            - name: RAG_PORT
              value: "8000"
            - name: NODE_ENV
              value: "production"
            - name: RAG_CHECK_EMBEDDING_CTX_LENGTH
              value: "False"
            - name: EMBEDDINGS_CHUNK_SIZE
              value: "8000"
            - name: DB_HOST
              value: "rag-api-postgres"
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "rag"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: librechat-credentials-env
                  key: RAG_POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: librechat-credentials-env
                  key: RAG_POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rag-api
  namespace: librechat
spec:
  selector:
    app.kubernetes.io/name: rag-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000