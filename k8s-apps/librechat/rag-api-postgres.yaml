apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rag-api-postgres
  namespace: librechat
spec:
  serviceName: rag-api-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-api-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-api-postgres
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: postgres
          image: pgvector/pgvector:pg17
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: librechat-credentials-env
                  key: RAG_POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: librechat-credentials-env
                  key: RAG_POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: rag
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "rag"]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "rag"]
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rag-api-postgres
  namespace: librechat
spec:
  selector:
    app.kubernetes.io/name: rag-api-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
