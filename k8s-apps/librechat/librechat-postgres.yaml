apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: librechat-postgres
  namespace: librechat
spec:
  serviceName: librechat-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: librechat-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: librechat-postgres
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: postgres
          image: ghcr.io/ferretdb/postgres-documentdb:17-0.107.0-ferretdb-2.7.0
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: librechat-credentials-env
                  key: FERRETDB_POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: librechat-credentials-env
                  key: FERRETDB_POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: postgres
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready"]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["pg_isready"]
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: librechat-postgres
  namespace: librechat
spec:
  selector:
    app.kubernetes.io/name: librechat-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
