apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-config
  namespace: librechat
data:
  librechat.yaml: |
    version: 1.2.1
    cache: true
    fileStrategy: "local"
    fileConfig:
      endpoints:
        default:
          fileLimit: 10
          fileSizeLimit: 25
          totalSizeLimit: 100
      serverFileSizeLimit: 100

    registration:
      socialLogins:
        - openid
    endpoints:
      agents:
        recursionLimit: 50
        maxRecursionLimit: 100
        disableBuilder: false
        # (optional) Agent Capabilities available to all users. Omit the ones you wish to exclude. Defaults to list below.
        # capabilities: ["execute_code", "file_search", "actions", "tools", "artifacts", "context", "ocr", "chain", "web_search"]
        # (optional) File citation configuration for file_search capability
        maxCitations: 30          # Maximum total citations in responses (1-50)
        maxCitationsPerFile: 7    # Maximum citations from each file (1-10)
        minRelevanceScore: 0.45   # Minimum relevance score threshold (0.0-1.0)
      custom:
        - name: "Glitchgate"
          apiKey: "${GLITCHGATE_API_KEY}"
          baseURL: "http://glitchgate.glitchgate.svc.cluster.local/v1"
          models:
            default:
              - "claude-sonnet-resilient"
              - "gc/claude-sonnet-4-6"
              - "gc/claude-sonnet-4-5"
              - "gc/claude-opus-4-6"
              - "gc/claude-opus-4-5"
              - "gc/claude-haiku-4-5"
              - "gc/gpt-4.1"
              - "gc/gpt-5"
              - "gc/gpt-5-mini"
              - "gc/gpt-5.1"
              - "gc/gpt-5.4"
              - "a/claude-sonnet-4-6"
              - "a/claude-opus-4-6"
              - "a/claude-haiku-4-5"
              - "c/zai-org/GLM-5-TEE"
              - "c/moonshotai/Kimi-K2.5-TEE"
              - "c/MiniMaxAI/MiniMax-M2.5-TEE"
              - "c/deepseek-ai/DeepSeek-R1-0528-TEE"
              - "c/deepseek-ai/DeepSeek-V3.2-TEE"
              - "c/Qwen/Qwen3-Coder-Next-TEE"
              - "c/Qwen/Qwen3-32B-TEE"
              - "c/Qwen/Qwen3.5-397B-A17B-TEE"
              - "s/MiniMax-M2.5"
              - "s/Kimi-K2.5"
              - "s/GLM-4.7"
              - "s/GLM-4.7-Flash"
              - "s/DeepSeek-R1-0528"
              - "s/DeepSeek-V3"
              - "s/DeepSeek-V3.2"
              - "s/Llama-3.3-70B-Instruct"
              - "s/MiniMax-M2.1"
              - "s/Kimi-K2-Instruct-0905"
              - "s/Kimi-K2-Thinking"
              - "s/Kimi-K2.5-NVFP4"
              - "s/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4"
              - "s/gpt-oss-120b"
              - "s/Qwen3-235B-A22B-Thinking-2507"
              - "s/Qwen3-Coder-480B-A35B-Instruct"
              - "s/Qwen3.5-397B-A17B"
              - "mm/MiniMax-M2.5"
            fetch: false
          titleConvo: true
          titleModel: "mm/MiniMax-M2.5"
          titleMethod: "completion"
          summarize: true
          summaryModel: "mm/MiniMax-M2.5"
          modelDisplayLabel: "Glitchgate"
          addParams:
            max_tokens: 128000
            max_output_tokens: 32000

    memory:
      disabled: false
      tokenLimit: 3000
      charLimit: 10000
      personalize: true
      messageWindowSize: 8
      validKeys: ["user_profile", "user_preferences", "tasks", "context"]
      agent:
        provider: "Glitchgate"
        model: "mm/MiniMax-M2.5"
        instructions: |
          You should take the message from the user and analyze it to see if it is a request to save information to memory.
          If it is, you should use the memory tools to save the information into one of the following validKeys:
          - user_profile - This is used to store information about the user such as their name, contact information, and other relevant facts. You should automatically save profile information.
          - user_preferences - This is used to store information about the user's preferences such as how you should respond, what topics you should avoid, and other preferences the user has explicity asked you to remember.
          - tasks - Save any tasks that the user has explicitly asked you to remember.
          - context - This is for any additional information that the user has asked you to remember.
        model_parameters:
          temperature: 0.2
          max_tokens: 2000

    webSearch:
      searchProvider: "serper"
      serperApiKey: "${SERPER_API_KEY}"
      scraperProvider: "serper"
      rerankerType: "jina"
      jinaApiKey: "${JINA_API_KEY}"
      jinaApiUrl: "${JINA_API_URL}"

    ocr:
      strategy: "mistral_ocr"
      apiKey: "${OCR_API_KEY}"
      mistralModel: "mistral-ocr-latest"
