apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-config
  namespace: librechat
data:
  librechat.yaml: |
    version: 1.2.1
    cache: true

    registration:
      socialLogins:
        - openid
    endpoints:
      agents:
        recursionLimit: 50
        maxRecursionLimit: 100
        disableBuilder: false
        capabilities: ["execute_code", "file_search", "actions", "tools", "artifacts", "context", "ocr", "chain", "web_search"]
        # (optional) File citation configuration for file_search capability
        maxCitations: 30          # Maximum total citations in responses (1-50)
        maxCitationsPerFile: 7    # Maximum citations from each file (1-10)
        minRelevanceScore: 0.45   # Minimum relevance score threshold (0.0-1.0)
      custom:
        - name: "Glitchgate"
          apiKey: "${GLITCHGATE_API_KEY}"
          baseURL: "https://glitchgate.corp.mulliken.net/openai/v1"
          models:
            default:
              - "synthetic/hf:moonshotai/Kimi-K2-Instruct-0905"
            fetch: true
          titleConvo: true
          titleModel: "synthetic/hf:moonshotai/Kimi-K2-Instruct-0905"
          titleMethod: "completion"
          summarize: true
          summaryModel: "synthetic/hf:moonshotai/Kimi-K2-Instruct-0905"
          modelDisplayLabel: "Glitchgate"
          addParams:
            max_tokens: 128000
            max_output_tokens: 32000

    memory:
      disabled: false
      tokenLimit: 3000
      charLimit: 10000
      personalize: true
      messageWindowSize: 8
      validKeys:
        - "user_preferences"
        - "conversation_context"
        - "learned_facts"
        - "personal_information"
      agent:
        provider: "Glitchgate"
        model: "synthetic/hf:zai-org/GLM-4.7-Flash"
        instructions: |
          Store information only in the specified validKeys categories.
          Focus on explicitly stated preferences and important facts.
          Delete outdated or corrected information promptly.
        model_parameters:
          temperature: 0.2
          max_tokens: 2000

    webSearch:
      searchProvider: "serper"
      serperApiKey: "${SERPER_API_KEY}"
      scraperProvider: "serper"
      scraperTimeout: 30000
      rerankerType: "jina"
      jinaApiKey: "${JINA_API_KEY}"
      jinaApiUrl: "${JINA_API_URL}"

    ocr:
      strategy: "mistral_ocr"
      apiKey: "${OCR_API_KEY}"
      mistralModel: "mistral-ocr-latest"

    fileConfig:
      endpoints:
        default:
          fileLimit: 10
          fileSizeLimit: 100
          totalSizeLimit: 500
      ocr:
        supportedMimeTypes:
          - "^image/(jpeg|gif|png|webp|heic|heif)$"
          - "^application/pdf$"
          - "^application/vnd\\.openxmlformats-officedocument\\.(wordprocessingml\\.document|presentationml\\.presentation|spreadsheetml\\.sheet)$"
          - "^application/vnd\\.ms-(word|powerpoint|excel)$"
          - "^application/epub\\+zip$"
      text:
        supportedMimeTypes:
          - "^text/(plain|markdown|csv|json|xml|html|css|javascript|typescript|x-python|x-java|x-csharp|x-php|x-ruby|x-go|x-rust|x-kotlin|x-swift|x-scala|x-perl|x-lua|x-shell|x-sql|x-yaml|x-toml)$"
          - "^application/(json|xml|javascript|x-javascript|typescript|x-typescript|x-python-code|x-sh|x-bash|x-csh|yaml|x-yaml|toml|x-toml)$"

    speech:
      tts:
        elevenlabs:
          apiKey: "${ELEVENLABS_API_KEY}"
          model: "eleven_flash_v2_5"
          voices: ["cgSgspJ2msm6clMCkdW9"]
          voice_settings:
            stability: 0.5
            similarity_boost: 0.75
            use_speaker_boost: true
      stt:
        openai:
          apiKey: "${OPENAI_API_KEY}"
          model: "whisper-1"
      speechTab:
        conversationMode: false
        advancedMode: false
        speechToText: true
        textToSpeech:
          engineTTS: "elevenlabs"
          voice: "cgSgspJ2msm6clMCkdW9"
          automaticPlayback: false
