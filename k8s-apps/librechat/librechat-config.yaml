apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-config
  namespace: librechat
data:
  librechat.yaml: |
    version: 1.2.1
    cache: true

    registration:
      socialLogins:
        - openid

    endpoints:
      agents:
        capabilities:
          - "context"
          - "ocr"
      custom:
        - name: "Glitchgate"
          apiKey: "${GLITCHGATE_API_KEY}"
          baseURL: "http://glitchgate.glitchgate.svc.cluster.local/v1"
          models:
            default:
              - "claude-sonnet-resilient"
              - "gc/claude-sonnet-4-6"
              - "gc/claude-sonnet-4-5"
              - "gc/claude-opus-4-6"
              - "gc/claude-opus-4-5"
              - "gc/claude-haiku-4-5"
              - "gc/gpt-4.1"
              - "gc/gpt-5"
              - "gc/gpt-5-mini"
              - "gc/gpt-5.1"
              - "gc/gpt-5.4"
              - "a/claude-sonnet-4-6"
              - "a/claude-opus-4-6"
              - "a/claude-haiku-4-5"
              - "c/zai-org/GLM-5-TEE"
              - "c/moonshotai/Kimi-K2.5-TEE"
              - "c/MiniMaxAI/MiniMax-M2.5-TEE"
              - "c/deepseek-ai/DeepSeek-R1-0528-TEE"
              - "c/deepseek-ai/DeepSeek-V3.2-TEE"
              - "c/Qwen/Qwen3-Coder-Next-TEE"
              - "c/Qwen/Qwen3-32B-TEE"
              - "c/Qwen/Qwen3.5-397B-A17B-TEE"
              - "s/MiniMax-M2.5"
              - "s/Kimi-K2.5"
              - "s/GLM-4.7"
              - "s/GLM-4.7-Flash"
              - "s/DeepSeek-R1-0528"
              - "s/DeepSeek-V3"
              - "s/DeepSeek-V3.2"
              - "s/Llama-3.3-70B-Instruct"
              - "s/MiniMax-M2.1"
              - "s/Kimi-K2-Instruct-0905"
              - "s/Kimi-K2-Thinking"
              - "s/Kimi-K2.5-NVFP4"
              - "s/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4"
              - "s/gpt-oss-120b"
              - "s/Qwen3-235B-A22B-Thinking-2507"
              - "s/Qwen3-Coder-480B-A35B-Instruct"
              - "s/Qwen3.5-397B-A17B"
              - "mm/MiniMax-M2.5"
            fetch: false
          titleConvo: true
          titleModel: "mm/MiniMax-M2.5"
          titleMethod: "completion"
          summarize: true
          summaryModel: "mm/MiniMax-M2.5"
          modelDisplayLabel: "Glitchgate"

    memory:
      disabled: false
      tokenLimit: 3000
      charLimit: 10000
      personalize: true
      messageWindowSize: 8
      validKeys: ["user_preferences", "personal_info"]
      agent:
        provider: "Glitchgate"
        model: "mm/MiniMax-M2.5"
        instructions: |
          You are a silent memory manager. Your ONLY purpose is to read and write to memory using the memory tools. Never respond to the user directly. Never engage in conversation. Only call memory tools when needed to store or retrieve information, then remain silent.

          You will receive messages in this format:

          # Current Chat:

          <existing_context>

          Human: <message_from_user>

          The "Human:" line is the latest user message. Use the full context to decide what memory operations (if any) are needed — then remain silent. Do not reply, explain yourself, or ask clarifying questions under any circumstances.

          ONLY store information if it represents:
          - user_preferences (e.g., formatting preferences, behavioral preferences, workstyle preferences)
          - personal_info (e.g., role, goals, responsibilities, context about the user)

          Do NOT add anything to memory that does not contain a user preference or personal info update. Conversational content, temporary context, or ephemeral task details should not be stored.
        model_parameters:
          temperature: 0.2
          max_tokens: 2000

    webSearch:
      searchProvider: "serper"
      serperApiKey: "${SERPER_API_KEY}"
      scraperProvider: "serper"
      rerankerType: "jina"
      jinaApiKey: "${JINA_API_KEY}"
      jinaApiUrl: "${JINA_API_URL}"

    ocr:
      strategy: "mistral_ocr"
      apiKey: "${OCR_API_KEY}"
      mistralModel: "mistral-ocr-latest"
