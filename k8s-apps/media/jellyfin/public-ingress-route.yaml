---
# Strip the /u prefix before forwarding to Umami
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: umami-stripprefix
  namespace: jellyfin
  labels:
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/part-of: media
    app.kubernetes.io/managed-by: argocd
spec:
  stripPrefix:
    prefixes:
      - /u
---
# Public IngressRoute for jellyfin.mulliken.net
# Routes /u/* to Umami (same-domain analytics proxy) and everything else to Jellyfin
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin-public
  namespace: jellyfin
  labels:
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/part-of: media
    app.kubernetes.io/managed-by: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`jellyfin.mulliken.net`) && PathPrefix(`/u/`)
      kind: Rule
      middlewares:
        - name: umami-stripprefix
          namespace: jellyfin
      services:
        - name: umami
          namespace: umami
          port: 3000
    - match: Host(`jellyfin.mulliken.net`)
      kind: Rule
      services:
        - name: jellyfin
          port: 8096
  tls:
    secretName: jellyfin-public-tls
