---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-redis
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm-redis
    app.kubernetes.io/instance: litellm
    app.kubernetes.io/part-of: utilities
    app.kubernetes.io/component: cache
    app.kubernetes.io/managed-by: argocd
  annotations:
    app.kubernetes.io/description: "Redis cache for LiteLLM proxy"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm-redis
      app.kubernetes.io/instance: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm-redis
        app.kubernetes.io/instance: litellm
        app.kubernetes.io/part-of: utilities
        app.kubernetes.io/component: cache
        app.kubernetes.io/managed-by: argocd
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: litellm-redis-pvc
