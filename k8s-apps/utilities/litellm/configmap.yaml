apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: utilities
    app.kubernetes.io/managed-by: argocd
data:
  config.yaml: |
    litellm_settings:
      drop_params: true
      cache: true
      cache_params:
        type: redis
        host: os.environ/REDIS_HOST
        port: os.environ/REDIS_PORT

    general_settings:
      store_model_in_db: true
      store_prompts_in_spend_logs: true
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL

    model_list:
      - model_name: c/zai-org/GLM-5-TEE
        litellm_params:
          model: chutes/zai-org/GLM-5-TEE
          api_key: os.environ/CHUTES_API_KEY
          input_cost_per_token: 9.5e-7
          output_cost_per_token: 3.15e-6
        model_info:
          supports_function_calling: true
      - model_name: c/moonshotai/Kimi-K2.5-TEE
        litellm_params:
          model: chutes/moonshotai/Kimi-K2.5-TEE
          api_key: os.environ/CHUTES_API_KEY
          input_cost_per_token: 4.5e-7
          output_cost_per_token: 2.2e-6
        model_info:
          supports_function_calling: true
      - model_name: c/MiniMaxAI/MiniMax-M2.5-TEE
        litellm_params:
          model: chutes/MiniMaxAI/MiniMax-M2.5-TEE
          api_key: os.environ/CHUTES_API_KEY
          input_cost_per_token: 3.0e-7
          output_cost_per_token: 1.1e-6
        model_info:
          supports_function_calling: true
      - model_name: c/deepseek-ai/DeepSeek-V3.2-TEE
        litellm_params:
          model: chutes/deepseek-ai/DeepSeek-V3.2-TEE
          api_key: os.environ/CHUTES_API_KEY
          input_cost_per_token: 2.8e-7
          output_cost_per_token: 4.2e-7
        model_info:
          supports_function_calling: true
      - model_name: c/deepseek-ai/DeepSeek-R1-0528-TEE
        litellm_params:
          model: chutes/deepseek-ai/DeepSeek-R1-0528-TEE
          api_key: os.environ/CHUTES_API_KEY
          input_cost_per_token: 4.5e-7
          output_cost_per_token: 2.15e-6
        model_info:
          supports_function_calling: true
      - model_name: c/Qwen/Qwen3-32B
        litellm_params:
          model: chutes/Qwen/Qwen3-32B
          api_key: os.environ/CHUTES_API_KEY
          input_cost_per_token: 8.0e-8
          output_cost_per_token: 2.4e-7
        model_info:
          supports_function_calling: true
      - model_name: c/Qwen/Qwen3-Coder-Next-TEE
        litellm_params:
          model: chutes/Qwen/Qwen3-Coder-Next-TEE
          api_key: os.environ/CHUTES_API_KEY
          input_cost_per_token: 1.2e-7
          output_cost_per_token: 7.5e-7
        model_info:
          supports_function_calling: true
      - model_name: c/chutesai/Mistral-Small-3.2-24B-Instruct-2506
