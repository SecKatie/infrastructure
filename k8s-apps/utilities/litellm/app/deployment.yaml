apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: utilities
    app.kubernetes.io/component: app
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
    spec:
      initContainers:
        - name: copy-copilot-tokens
          image: busybox:1.36
          command:
            - sh
            - -c
            - cp /secrets/github_copilot/* /tokens/
          volumeMounts:
            - name: copilot-token-secrets
              mountPath: /secrets/github_copilot
              readOnly: true
            - name: copilot-tokens
              mountPath: /tokens
      containers:
        - name: litellm
          image: docker.litellm.ai/berriai/litellm:main-latest
          args:
            - --config
            - /app/config.yaml
            - --port
            - "4000"
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: TZ
              value: America/New_York
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: litellm-master-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: database-url
            - name: REDIS_HOST
              value: litellm-redis.litellm.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: GITHUB_COPILOT_TOKEN_DIR
              value: /root/.config/litellm/github_copilot
            - name: GITHUB_COPILOT_ACCESS_TOKEN_FILE
              value: access-token
            - name: GITHUB_COPILOT_API_KEY_FILE
              value: api-key.json
            - name: VERTEXAI_PROJECT
              value: itpc-gcp-prodsec-eng-claude
            - name: VERTEXAI_LOCATION
              value: us-east5
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /gcp/adc.json
            - name: CHUTES_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: chutes-api-key
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: ollama-api-key
            - name: SYNTHETIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: synthetic-api-key
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
            - name: copilot-tokens
              mountPath: /root/.config/litellm/github_copilot
            - name: gcp-adc
              mountPath: /gcp
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: copilot-token-secrets
          secret:
            secretName: litellm-secrets
            items:
              - key: github-copilot-access-token
                path: access-token
              - key: github-copilot-api-key
                path: api-key.json
        - name: copilot-tokens
          emptyDir: {}
        - name: gcp-adc
          secret:
            secretName: litellm-secrets
            items:
              - key: vertex-adc
                path: adc.json
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
