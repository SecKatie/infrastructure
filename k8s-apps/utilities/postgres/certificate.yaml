apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: db-tls
  namespace: postgres
  labels:
    app.kubernetes.io/name: pgadmin
    app.kubernetes.io/part-of: utilities
    app.kubernetes.io/managed-by: argocd
spec:
  secretName: db-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - db.corp.mulliken.net
