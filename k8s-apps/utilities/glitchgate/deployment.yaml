apiVersion: apps/v1
kind: Deployment
metadata:
  name: glitchgate
  namespace: glitchgate
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glitchgate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glitchgate
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        - name: config-init
          image: alpine:3
          command:
            - sh
            - -c
            - apk add --no-cache gettext -q && envsubst < /config-template/config.yaml > /etc/glitchgate/config.yaml
          envFrom:
            - secretRef:
                name: glitchgate-secrets
          volumeMounts:
            - name: config-template
              mountPath: /config-template
              readOnly: true
            - name: config
              mountPath: /etc/glitchgate
      containers:
        - name: glitchgate
          image: ghcr.io/seckatie/glitchgate:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: glitchgate-secrets
          volumeMounts:
            - name: config
              mountPath: /etc/glitchgate
              readOnly: true
      volumes:
        - name: config-template
          configMap:
            name: glitchgate-config
        - name: config
          emptyDir: {}
