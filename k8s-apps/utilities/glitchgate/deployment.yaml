apiVersion: apps/v1
kind: Deployment
metadata:
  name: glitchgate
  namespace: glitchgate
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glitchgate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glitchgate
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        - name: config-init
          image: alpine:3
          command:
            - sh
            - -c
            - apk add --no-cache gettext -q && envsubst < /config-template/config.yaml > /data/config.yaml
          envFrom:
            - secretRef:
                name: glitchgate-secrets
          volumeMounts:
            - name: config-template
              mountPath: /config-template
              readOnly: true
            - name: config
              mountPath: /data
      containers:
        - name: glitchgate
          image: ghcr.io/seckatie/glitchgate:v0.0.14
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: glitchgate-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /data
            - name: copilot-tokens
              mountPath: /home/glitchgate/.config/glitchgate/copilot
              readOnly: true
      volumes:
        - name: config-template
          configMap:
            name: glitchgate-config
        - name: config
          emptyDir: {}
        - name: copilot-tokens
          secret:
            secretName: glitchgate-copilot-tokens
