apiVersion: apps/v1
kind: Deployment
metadata:
  name: glitchgate
  namespace: glitchgate
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glitchgate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glitchgate
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: glitchgate
          image: ghcr.io/seckatie/glitchgate:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: glitchgate-secrets
          volumeMounts:
            - name: config
              mountPath: /etc/glitchgate
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: glitchgate-config
