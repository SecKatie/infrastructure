      - model_name: "s/*"
        provider: "synthetic"
      - model_name: "s/MiniMax-M2.5"
        provider: "synthetic"
        upstream_model: "hf:MiniMaxAI/MiniMax-M2.5"
        metadata:
          input_token_cost: 0.60
          output_token_cost: 3.00
      - model_name: "s/Kimi-K2.5"
        provider: "synthetic"
        upstream_model: "hf:moonshotai/Kimi-K2.5"
        metadata:
          input_token_cost: 0.60
