          cache_read_cost: 0.06
      - model_name: "c/Qwen/Qwen3-32B-TEE"
        provider: "chutes"
        upstream_model: "Qwen/Qwen3-32B-TEE"
        metadata:
          input_token_cost: 0.08
          output_token_cost: 0.24
          cache_read_cost: 0.04
      - model_name: "c/Qwen/Qwen3.5-397B-A17B-TEE"
        provider: "chutes"
        upstream_model: "Qwen/Qwen3.5-397B-A17B-TEE"
        metadata:
          input_token_cost: 0.39
